<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Duck Client</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei",Consolas,monospace;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
body{
  background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.45)),
  url("https://api.yimian.xyz/img?type=moe&size=1920x1080") center/cover no-repeat;
}
#app{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.panel{
  width:min(92vw, 940px);
  height:min(82vh, 540px);
  display:flex;
  border-radius:28px;
  overflow:hidden;
  background:rgba(24,24,28,.76);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  backdrop-filter:blur(16px);
}
.left{
  width:240px;
  flex:0 0 240px;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  gap:18px;
  background:rgba(16,16,20,.62);
  border-right:1px solid rgba(255,255,255,.08);
}
.brand h1{
  color:#fff;
  font-size:30px;
  line-height:1;
  letter-spacing:2px;
}
.brand p{
  margin-top:6px;
  color:#5aa9ff;
  font-size:15px;
  letter-spacing:3px;
  font-weight:700;
}
.tabs{
  display:flex;
  flex-direction:column;
  gap:12px;
  flex:1;
}
.tab{
  width:100%;
  height:58px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.72);
  font-size:15px;
  font-weight:800;
  text-align:left;
  padding:0 18px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
}
.tab small{
  display:block;
  margin-top:2px;
  font-size:10px;
  opacity:.56;
}
.tab.active{
  background:linear-gradient(135deg, rgba(245,245,250,.96), rgba(220,225,255,.88));
  color:#0d3a75;
}
.left-bottom{
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,.08);
}
.running{
  color:#30d36d;
  font-size:12px;
  margin-bottom:12px;
}
.close-btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:14px;
  font-weight:800;
}
.right{
  flex:1;
  min-width:0;
  padding:18px;
  overflow:hidden;
}
.page{
  display:none;
  height:100%;
  overflow-y:auto;
  padding-right:4px;
}
.page.active{ display:block; }
.page::-webkit-scrollbar{ width:4px; }
.page::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.22); border-radius:10px; }

.card{
  margin-bottom:14px;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.10);
}
.card-title{
  color:#1c1c1c;
  font-size:18px;
  font-weight:800;
  margin-bottom:8px;
}
.card-sub{
  color:rgba(30,30,30,.42);
  font-size:11px;
  margin-bottom:14px;
}
.button-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
}
.btn{
  height:52px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.10);
  color:#1d1d1d;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}
.switch-row{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-radius:18px;
  padding:0 18px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.10);
  margin-bottom:12px;
}
.switch-text{ display:flex; flex-direction:column; gap:3px; }
.switch-text b{ color:#1d1d1d; font-size:16px; }
.switch-text span{ color:rgba(25,25,25,.45); font-size:11px; }
.switch{
  position:relative;
  width:72px;
  height:36px;
  border-radius:999px;
  background:rgba(255,255,255,.34);
}
.switch::after{
  content:"OFF";
  position:absolute;
  top:4px;
  left:4px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#fff;
  color:#8a8a8a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:800;
}
.switch.on{
  background:linear-gradient(135deg,#2fd66c,#6ef0a1);
}
.switch.on::after{
  content:"ON";
  left:40px;
  color:#1b7b3f;
}
.notice{
  margin-top:12px;
  height:38px;
  padding:0 14px;
  display:flex;
  align-items:center;
  border-radius:14px;
  color:rgba(255,255,255,.64);
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.10);
  font-size:11px;
}

@media (max-width: 560px){
  .panel{
    width:96vw;
    height:92vh;
    flex-direction:column;
  }
  .left{
    width:100%;
    flex:0 0 auto;
    flex-direction:row;
    align-items:flex-start;
    gap:14px;
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .brand{ width:120px; flex:0 0 120px; }
  .tabs{ flex:1; }
  .right{ padding:14px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="panel">
    <div class="left">
      <div class="brand">
        <h1>Duck</h1>
        <p>Client</p>
      </div>

      <div class="tabs">
        <button class="tab" onclick="switchTab(this,'player')">玩家<small>PLAYER</small></button>
        <button class="tab" onclick="switchTab(this,'world')">世界<small>WORLD</small></button>
        <button class="tab active" onclick="switchTab(this,'visual')">视觉<small>VISUAL</small></button>
      </div>

      <div class="left-bottom">
        <div class="running">• Running</div>
        <button class="close-btn">关闭</button>
      </div>
    </div>

    <div class="right">
      <div class="page" id="player">
        <div class="card">
          <div class="card-title">玩家功能</div>
          <div class="card-sub">Player Modules</div>
          <div class="button-grid">
            <button class="btn" onclick="runBridge('toggleFreeCam')">自由视角</button>
            <button class="btn" onclick="runBridge('summonVehicle')">召唤坐骑</button>
            <button class="btn" onclick="runBridge('toggleAutoTool')">自动工具</button>
            <button class="btn" onclick="runBridge('autofish')">自动钓鱼</button>
          </div>
        </div>
      </div>

      <div class="page" id="world">
        <div class="card">
          <div class="card-title">世界功能</div>
          <div class="card-sub">World Modules</div>
          <div class="button-grid">
            <button class="btn" onclick="runBridge('loadMaterial')">加载资源</button>
            <button class="btn" onclick="runBridge('extractMaterial')">解压资源</button>
            <button class="btn" onclick="runBridge('deleteEN')">清理资源</button>
            <button class="btn" onclick="runBridge('selectBranch')">选择分支</button>
          </div>
        </div>
      </div>

      <div class="page active" id="visual">
        <div class="card">
          <div class="card-title">视觉功能</div>
          <div class="card-sub">Visual Modules</div>

          <div class="switch-row">
            <div class="switch-text"><b>NoHurtCam</b><span>受击镜头</span></div>
            <div class="switch" onclick="toggleSwitch(this,'FPSdisplay')"></div>
          </div>

          <div class="switch-row">
            <div class="switch-text"><b>Special</b><span>特殊效果</span></div>
            <div class="switch" onclick="toggleSwitch(this,'toggleXray')"></div>
          </div>

          <div class="switch-row">
            <div class="switch-text"><b>Tailv</b><span>轨迹/尾迹</span></div>
            <div class="switch" onclick="toggleSwitch(this,'toggleHeartTrail')"></div>
          </div>

          <div class="switch-row">
            <div class="switch-text"><b>Night</b><span>夜视效果</span></div>
            <div class="switch" onclick="toggleSwitch(this,'toggleNightVision')"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">扩展功能</div>
          <div class="card-sub">Extra Modules</div>
          <div class="button-grid">
            <button class="btn" onclick="runBridge('loadPyScript')">脚本菜单</button>
            <button class="btn" onclick="runBridge('openScriptLoader')">加载器</button>
            <button class="btn" onclick="runBridge('toggleDepthOfField')">景深</button>
            <button class="btn" onclick="runBridge('toggleHitEffect')">命中特效</button>
          </div>
        </div>

        <div class="notice" id="notice">面板已加载，等待操作...</div>
      </div>
    </div>
  </div>
</div>

<script>
const notice=document.getElementById('notice');

function switchTab(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function toggleSwitch(el,method){
  el.classList.toggle('on');
  runBridge(method);
}

function runBridge(method){
  if(!window.JsBridge){ notice && (notice.innerText='JsBridge 未检测到'); return; }
  if(typeof window.JsBridge[method] !== 'function'){ notice && (notice.innerText='方法不存在：'+method); return; }
  try{ window.JsBridge[method](); notice && (notice.innerText='执行成功：'+method); }catch(e){ notice && (notice.innerText='执行失败：'+method); }
}
</script>
</body>
</html>
