<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Anime Panel</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",Consolas,monospace;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    background:
        linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,.45)),
        url("https://api.yimian.xyz/img?type=moe&size=1920x1080") center/cover no-repeat;
}

#app{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:18px 12px;
}

.panel{
    width:min(430px, 94vw);
    max-height:calc(100vh - 36px);
    overflow-y:auto;
    border-radius:22px;
    background:rgba(18,18,22,.70);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 18px 50px rgba(0,0,0,.48);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
}

.panel::-webkit-scrollbar{
    width:4px;
}

.panel::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.22);
    border-radius:10px;
}

.header{
    padding:16px 18px 14px;
    background:linear-gradient(135deg, rgba(120,90,255,.24), rgba(0,180,255,.14));
    border-bottom:1px solid rgba(255,255,255,.12);
}

.title{
    color:#fff;
    font-size:20px;
    font-weight:800;
    letter-spacing:2px;
}

.subtitle{
    margin-top:4px;
    color:rgba(255,255,255,.68);
    font-size:11px;
}

.card{
    margin:12px;
    padding:12px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);
}

.card-title{
    margin-bottom:10px;
    color:rgba(255,255,255,.72);
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:9px;
}

.btn{
    height:42px;
    border:none;
    border-radius:13px;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
    border:1px solid rgba(255,255,255,.14);
    color:rgba(255,255,255,.88);
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    transition:.16s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
}

.btn:active{
    transform:scale(.95);
    background:linear-gradient(135deg, rgba(132,96,255,.88), rgba(0,190,255,.82));
    box-shadow:0 0 16px rgba(90,160,255,.55);
}

.switch-row{
    min-height:42px;
    margin-bottom:8px;
    padding:0 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);
    color:rgba(255,255,255,.84);
    font-size:13px;
    font-weight:700;
}

.switch-row input{
    display:none;
}

.switch{
    width:42px;
    height:23px;
    padding:3px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    transition:.2s;
    flex-shrink:0;
}

.switch::after{
    content:"";
    display:block;
    width:17px;
    height:17px;
    border-radius:50%;
    background:rgba(255,255,255,.82);
    transition:.2s;
}

.switch-row input:checked + .switch{
    background:linear-gradient(135deg, #8c6cff, #00c8ff);
    box-shadow:0 0 12px rgba(80,180,255,.55);
}

.switch-row input:checked + .switch::after{
    transform:translateX(19px);
}

.notice{
    margin:12px;
    height:38px;
    padding:0 14px;
    display:flex;
    align-items:center;
    border-radius:14px;
    color:rgba(255,255,255,.64);
    background:rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.10);
    font-size:11px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

@media (max-width:380px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>
<div id="app">
    <div class="panel" id="panel">
        <div class="header">
            <div class="title">CONTROL PANEL</div>
            <div class="subtitle">XP Module · Vertical Card UI</div>
        </div>

        <div class="card">
            <div class="card-title">ACCOUNT MANAGER</div>
            <div class="grid">
                <button class="btn" onclick="runBridge('exportAccount')">导出账号</button>
                <button class="btn" onclick="runBridge('importAccount')">导入账号</button>
                <button class="btn" onclick="runBridge('toggleCookieLogin')">Cookie登录</button>
                <button class="btn" onclick="runBridge('toggleCookieExport')">导出Cookie</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">RESOURCE MODULE</div>
            <div class="grid">
                <button class="btn" onclick="runBridge('loadMaterial')">加载资源</button>
                <button class="btn" onclick="runBridge('extractMaterial')">解压资源</button>
                <button class="btn" onclick="runBridge('deleteEN')">清理资源</button>
                <button class="btn" onclick="runBridge('selectBranch')">选择分支</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">VISUAL SWITCH</div>

            <label class="switch-row">
                <span>FPS显示</span>
                <input type="checkbox" onchange="runBridge('FPSdisplay')">
                <i class="switch"></i>
            </label>

            <label class="switch-row">
                <span>X-Ray</span>
                <input type="checkbox" onchange="runBridge('toggleXray')">
                <i class="switch"></i>
            </label>

            <label class="switch-row">
                <span>夜视效果</span>
                <input type="checkbox" onchange="runBridge('toggleNightVision')">
                <i class="switch"></i>
            </label>

            <label class="switch-row">
                <span>景深效果</span>
                <input type="checkbox" onchange="runBridge('toggleDepthOfField')">
                <i class="switch"></i>
            </label>
        </div>

        <div class="card">
            <div class="card-title">EXTRA ACTION</div>
            <div class="grid">
                <button class="btn" onclick="runBridge('toggleFreeCam')">自由视角</button>
                <button class="btn" onclick="runBridge('summonVehicle')">召唤坐骑</button>
                <button class="btn" onclick="runBridge('loadPyScript')">脚本菜单</button>
                <button class="btn" onclick="runBridge('autofish')">自动钓鱼</button>
                <button class="btn" onclick="runBridge('toggleHitEffect')">命中特效</button>
                <button class="btn" onclick="runBridge('toggleHeartTrail')">轨迹特效</button>
                <button class="btn" onclick="runBridge('openScriptLoader')">加载器</button>
                <button class="btn" onclick="runBridge('toggleAutoTool')">自动工具</button>
                <button class="btn" onclick="runBridge('startServerIpCapture')">IP捕获</button>
            </div>
        </div>

        <div class="notice" id="notice">面板已加载，等待操作...</div>
    </div>
</div>

<script>
const notice = document.getElementById("notice");

function runBridge(method){
    notice.innerText = "执行：" + method;

    if(!window.JsBridge){
        notice.innerText = "JsBridge 未检测到：" + method;
        return;
    }

    if(typeof window.JsBridge[method] !== "function"){
        notice.innerText = "方法不存在：" + method;
        return;
    }

    try{
        window.JsBridge[method]();
        notice.innerText = "执行成功：" + method;
    }catch(e){
        notice.innerText = "执行失败：" + method;
    }
}
</script>
</body>
</html>
