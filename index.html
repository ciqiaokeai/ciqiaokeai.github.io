<div id="scale-wrapper">
    <div class="panel" id="panel">
        <div class="glass">
            <div class="title">HACKER CONTROL</div>

            <div class="status">
                <div><span class="dot"></span>CORE ONLINE</div>
                <div id="clock">--:--:--</div>
            </div>

            <div class="layout">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab(this,'account','ACCOUNT MODULE')">ACCOUNT<span>IDENTITY</span></button>
                    <button class="tab" onclick="switchTab(this,'resource','RESOURCE MODULE')">RESOURCE<span>ASSETS</span></button>
                    <button class="tab" onclick="switchTab(this,'feature','FEATURE MODULE')">FEATURE<span>SYSTEM</span></button>
                </div>

                <div class="right">
                    <div class="module">
                        <div id="moduleTitle">ACCOUNT MODULE</div><small>ACCESS :: ROOT</small>
                    </div>

                    <div class="area">
                        <div class="tab-content active" id="account">
                            <div class="grid">
                                <button class="btn" onclick="runBridge(this,'exportAccount')">EXPORT</button>
                                <button class="btn" onclick="runBridge(this,'importAccount')">IMPORT</button>
                                <button class="btn" onclick="runBridge(this,'toggleCookieLogin')">COOKIE LOGIN</button>
                                <button class="btn" onclick="runBridge(this,'toggleCookieExport')">COOKIE DUMP</button>
                            </div>
                        </div>

                        <div class="tab-content" id="resource">
                            <div class="grid">
                                <button class="btn" onclick="runBridge(this,'loadMaterial')">LOAD TEX</button>
                                <button class="btn" onclick="runBridge(this,'extractMaterial')">UNPACK</button>
                                <button class="btn" onclick="runBridge(this,'toggleXray')">X-RAY</button>
                                <button class="btn" onclick="runBridge(this,'deleteEN')">CLEAN</button>
                                <button class="btn" onclick="runBridge(this,'selectBranch')">BRANCH</button>
                            </div>
                        </div>

                        <div class="tab-content" id="feature">
                            <div class="grid">
                                <button class="btn" onclick="runBridge(this,'FPSdisplay')">FPS</button>
                                <button class="btn" onclick="runBridge(this,'toggleFreeCam')">FREECAM</button>
                                <button class="btn" onclick="runBridge(this,'toggleNightVision')">NV MODE</button>
                                <button class="btn" onclick="runBridge(this,'toggleDepthOfField')">DOF</button>
                                <button class="btn" onclick="runBridge(this,'summonVehicle')">MOUNT</button>
                                <button class="btn" onclick="runBridge(this,'loadPyScript')">TP MENU</button>
                                <button class="btn" onclick="runBridge(this,'autofish')">AUTO FISH</button>
                                <button class="btn" onclick="runBridge(this,'toggleHitEffect')">HIT FX</button>
                                <button class="btn" onclick="runBridge(this,'toggleHeartTrail')">TRAIL</button>
                                <button class="btn" onclick="runBridge(this,'openScriptLoader')">LOADER</button>
                                <button class="btn" onclick="runBridge(this,'toggleAutoTool')">AUTO TOOL</button>
                                <button class="btn" onclick="runBridge(this,'startServerIpCapture')">IP TRACE</button>
                            </div>
                        </div>
                    </div>

                    <div class="console" id="console">
                        <div class="log">System initialized.</div>
                        <div class="log">Waiting for command.</div>
                        <div class="log">JsBridge checking...</div>
                    </div>
                </div>
            </div>

            <div class="footer">SYSTEM :: ONLINE :: SECURE PANEL</div>
        </div>
    </div>
</div>

<script>
    const scaleWrapper=document.getElementById("scale-wrapper");
    const panel=document.getElementById("panel");
    const consoleBox=document.getElementById("console");
    const moduleTitle=document.getElementById("moduleTitle");
    const clock=document.getElementById("clock");
    
    function autoScale(){
        scaleWrapper.style.transform="scale(1)";
        const s=Math.min(window.innerWidth/panel.offsetWidth*.9,window.innerHeight/panel.offsetHeight*.9,1);
        scaleWrapper.style.transform=`scale(${s})`;
    }
    
    function switchTab(el,id,title){
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
        el.classList.add("active");
        document.getElementById(id).classList.add("active");
        moduleTitle.innerText=title;
        addLog("Module switched: "+title);
        autoScale();
    }
    
    function addLog(text){
        const line=document.createElement("div");
        line.className="log";
        line.innerText=text;
        consoleBox.appendChild(line);
        while(consoleBox.children.length>4)consoleBox.removeChild(consoleBox.children[0]);
    }
    
    function runBridge(btn,method){
        btn.classList.add("running");
        addLog("Executing: "+method);
        setTimeout(()=>btn.classList.remove("running"),300);
    
        if(!window.JsBridge){
            addLog("Failed: JsBridge not detected.");
            return;
        }
    
        if(typeof window.JsBridge[method]!=="function"){
            addLog("Failed: method not found.");
            return;
        }
    
        try{
            window.JsBridge[method]();
            addLog("Success: "+method);
        }catch(e){
            addLog("Error: "+method);
        }
    }
    
    function updateClock(){
        const d=new Date();
        clock.innerText=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,"0")).join(":");
    }
    
    function initMatrix(){
        const canvas=document.getElementById("matrix");
        const ctx=canvas.getContext("2d");
        const chars="01ACCESSROOTSYSTEMBRIDGE";
        const fontSize=14;
        let drops=[];
    
        function resize(){
            canvas.width=innerWidth;
            canvas.height=innerHeight;
            drops=Array(Math.floor(canvas.width/fontSize)).fill(1);
            autoScale();
        }
    
        function draw(){
            ctx.fillStyle="rgba(0,0,0,.08)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle="#00ff9d";
            ctx.font=fontSize+"px Consolas";
    
            for(let i=0;i<drops.length;i++){
                const text=chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text,i*fontSize,drops[i]*fontSize);
                if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0;
                drops[i]++;
            }
        }
    
        resize();
        window.addEventListener("resize",resize);
        setInterval(draw,45);
    }
    
    window.onload=()=>{
        autoScale();
        initMatrix();
        updateClock();
        setInterval(updateClock,1000);
        addLog(window.JsBridge?"JsBridge detected.":"JsBridge not detected.");
    };
</script>
